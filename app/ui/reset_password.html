<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCOREIA | Restablecer Contraseña</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.0.0/css/flag-icons.min.css" />
    <style>
        :root {
            --primary: #0b1310;
            --accent: #398a48;
            --accent-glow: rgba(57,138,72,0.4);
            --surface: #13221c;
            --cream: #f5f5dc;
            --error: #ef4444;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--primary);
            color: var(--cream);
            overflow-x: hidden;
            min-height: 100vh;
        }

        .font-headline { font-family: 'Space Grotesk', sans-serif; }
        .text-accent { color: var(--accent); }
        .bg-accent { background-color: var(--accent); }

        .glass-panel-premium {
            background: linear-gradient(135deg, rgba(19, 34, 28, 0.6) 0%, rgba(11, 19, 16, 0.8) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(245, 245, 220, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(245, 245, 220, 0.02);
            position: relative;
            overflow: hidden;
        }

        .glass-panel-premium::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(57,138,72,0.5), transparent);
        }

        .input-glow:focus-within {
            box-shadow: 0 0 15px var(--accent-glow);
            border-color: var(--accent);
        }
        
        .relative-z { position: relative; z-index: 10; }
        .bg-background { background-color: var(--primary); }

        .particle {
            position: absolute;
            background: var(--accent);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.3;
        }
    </style>
</head>
<body class="flex items-center justify-center relative selection:bg-accent selection:text-white">

    
    <canvas id="particlesCanvas" class="absolute inset-0 z-0"></canvas>

    <div class="w-full max-w-md px-6 md:px-8 relative-z transition-all duration-500 ease-in-out" id="mainContainer">
        
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-surface border border-cream/10 mb-4 shadow-[0_0_30px_rgba(57,138,72,0.2)]">
                <span class="material-symbols-outlined text-4xl text-accent">lock_reset</span>
            </div>
            <h1 class="text-3xl md:text-4xl font-headline  tracking-tight">SCORE<span class="text-accent">IA</span></h1>
            <p class="text-cream/50 mt-2 text-sm">Restablecer Contraseña</p>
        </div>

        <div id="resetPanel" class="glass-panel-premium p-8 rounded-3xl space-y-6">
            <p class="text-xs text-cream/60 text-center max-w-sm mx-auto">Ingresa tu nueva contraseña para acceder al sistema.</p>
            
            <form id="resetForm" class="space-y-5">
                <div>
                    <label class="text-xs  text-cream/60 uppercase tracking-widest mb-2 block">Nueva Contraseña</label>
                    <div class="relative input-glow rounded-xl transition-all border border-cream/10 bg-black/40 flex items-center">
                        <span class="material-symbols-outlined text-cream/40 ml-4">lock</span>
                        <input id="resetPass" type="password" placeholder="••••••••" required minlength="6"
                            class="w-full bg-transparent border-none px-3 py-3.5 text-cream placeholder-cream/30 focus:outline-none focus:ring-0 font-body-md">
                        <button type="button" onclick="togglePassword('resetPass', 'resetEye')" class="mr-4 text-cream/40 hover:text-cream transition-colors flex items-center justify-center focus:outline-none">
                            <span id="resetEye" class="material-symbols-outlined">visibility</span>
                        </button>
                    </div>
                </div>

                <p id="resetMessage" class="hidden text-xs text-center "></p>
                
                <button type="submit" id="btnSubmitReset" class="w-full bg-accent text-white  py-4 rounded-xl hover:scale-[1.02] transition-all shadow-[0_0_20px_rgba(57,138,72,0.3)] hover:shadow-[0_0_30px_rgba(57,138,72,0.5)] text-sm uppercase tracking-widest">
                    Guardar Contraseña
                </button>
            </form>
            <div class="mt-4 text-center">
                <a href="/login" class="text-xs text-cream/40 hover:text-accent transition-colors ">Volver al Login</a>
            </div>
        </div>
    </div>

    <script>
        // Particles Background (simplified for login)
        const canvas = document.getElementById('particlesCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(57,138,72,0.3)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 50; i++) {
                particles.push(new Particle());
            }
        }
        
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();

        // Toggle Password
        window.togglePassword = function(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                input.type = 'password';
                icon.innerText = 'visibility';
            }
        }

        // Handle Reset Submission
        const resetForm = document.getElementById('resetForm');
        const resetMessage = document.getElementById('resetMessage');
        const btnSubmitReset = document.getElementById('btnSubmitReset');

        // Extract token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            resetMessage.textContent = "Error: El enlace no es válido o falta el token.";
            resetMessage.className = "text-error text-xs text-center  block";
            btnSubmitReset.disabled = true;
            btnSubmitReset.classList.add('opacity-50', 'cursor-not-allowed');
        }

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('resetPass').value;

            try {
                btnSubmitReset.disabled = true;
                btnSubmitReset.textContent = "Procesando...";

                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, new_password: newPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    resetMessage.textContent = "¡Contraseña actualizada! Redirigiendo al login...";
                    resetMessage.className = "text-accent text-xs text-center  block";
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    resetMessage.textContent = data.detail || "Error al actualizar la contraseña.";
                    resetMessage.className = "text-error text-xs text-center  block";
                    btnSubmitReset.disabled = false;
                    btnSubmitReset.textContent = "Guardar Contraseña";
                }
            } catch (error) {
                resetMessage.textContent = "Error de conexión con el servidor.";
                resetMessage.className = "text-error text-xs text-center  block";
                btnSubmitReset.disabled = false;
                btnSubmitReset.textContent = "Guardar Contraseña";
            }
        });
    </script>
</body>
</html>
