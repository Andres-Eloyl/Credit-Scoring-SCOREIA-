<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCOREIA | Restablecer Contraseña</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.0.0/css/flag-icons.min.css" />
    <style>
        .bg-mesh {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
            background-color: #050a08;
            background-image:
                radial-gradient(800px circle at var(--mouse-x, 50vw) var(--mouse-y, 50vh), rgba(var(--color-accent-comma), 0.15), transparent 40%);
        }

        .grid-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(245,245,220,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(245,245,220,0.02) 1px, transparent 1px);
            background-size: 40px 40px; z-index: -1; pointer-events: none;
        }

        .glass-card {
            background: linear-gradient(135deg, rgba(245, 245, 220, 0.04) 0%, rgba(245, 245, 220, 0.01) 100%);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(245, 245, 220, 0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transition: all 0.4s ease;
        }
        .glass-card:hover {
            border-color: rgba(245, 245, 220, 0.2);
            box-shadow: 0 0 25px rgba(var(--color-accent-comma), 0.15);
            transform: translateY(-4px);
        }

        @keyframes fade-in-up { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .animate-hero { animation: fade-in-up 0.8s ease-out forwards; }
        .animate-hero-delay { animation: fade-in-up 0.8s ease-out 0.2s forwards; opacity: 0; }
        .animate-hero-delay2 { animation: fade-in-up 0.8s ease-out 0.4s forwards; opacity: 0; }
        
        .glass-panel-premium {
            background: linear-gradient(145deg, rgba(20,28,22,0.6) 0%, rgba(10,14,10,0.8) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(245, 245, 220, 0.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
    </style>
        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
</head>
<body class="bg-background text-cream overflow-x-hidden min-h-screen font-body">
<div class="bg-mesh"></div>
<div class="grid-overlay"></div>




    
    <canvas id="particlesCanvas" class="absolute inset-0 z-0"></canvas>

    <div class="w-full max-w-md px-6 md:px-8 relative-z transition-all duration-500 ease-in-out" id="mainContainer">
        
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-surface border border-cream/10 mb-4 shadow-[0_0_30px_rgba(57,138,72,0.2)]">
                <span class="material-symbols-outlined text-4xl text-accent">lock_reset</span>
            </div>
            <h1 class="text-3xl md:text-4xl tracking-tight font-headline">SCORE<span class="text-accent">IA</span></h1>
            <p class="text-cream/50 mt-2 text-sm">Restablecer Contraseña</p>
        </div>

        <div id="resetPanel" class="glass-panel-premium p-8 rounded-3xl space-y-6">
            <p class="text-xs text-cream/60 text-center max-w-sm mx-auto">Ingresa tu nueva contraseña para acceder al sistema.</p>
            
            <form id="resetForm" class="space-y-5">
                <div>
                    <label class="text-xs text-cream/60 uppercase tracking-widest mb-2 block">Nueva Contraseña</label>
                    <div class="relative input-glow rounded-xl transition-all border border-cream/10 bg-black/40 flex items-center">
                        <span class="material-symbols-outlined text-cream/40 ml-4">lock</span>
                        <input id="resetPass" type="password" placeholder="••••••••" required minlength="6"
                            class="w-full bg-transparent border-none px-3 py-3.5 text-cream placeholder-cream/30 focus:outline-none focus:ring-0 font-body-md">
                        <button type="button" onclick="togglePassword('resetPass', 'resetEye')" class="mr-4 text-cream/40 hover:text-cream transition-colors flex items-center justify-center focus:outline-none">
                            <span id="resetEye" class="material-symbols-outlined">visibility</span>
                        </button>
                    </div>
                </div>

                <p id="resetMessage" class="hidden text-xs text-center"></p>
                
                <button type="submit" id="btnSubmitReset" class="w-full bg-accent text-white font-medium py-3 rounded-lg hover:bg-[#2e713a] transition-colors text-sm tracking-wide shadow-sm mt-4">
                    Guardar Contraseña
                </button>
            </form>
            <div class="mt-4 text-center">
                <a href="/login" class="text-xs text-cream/40 hover:text-accent transition-colors">Volver al Login</a>
            </div>
        </div>
    </div>

    <script>
        // Particles Background (simplified for login)
        const canvas = document.getElementById('particlesCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(57,138,72,0.3)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 50; i++) {
                particles.push(new Particle());
            }
        }
        
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();

        // Toggle Password
        window.togglePassword = function(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                input.type = 'password';
                icon.innerText = 'visibility';
            }
        }

        // Handle Reset Submission
        const resetForm = document.getElementById('resetForm');
        const resetMessage = document.getElementById('resetMessage');
        const btnSubmitReset = document.getElementById('btnSubmitReset');

        // Extract token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            resetMessage.textContent = "Error: El enlace no es válido o falta el token.";
            resetMessage.className = "text-error text-xs text-center  block";
            btnSubmitReset.disabled = true;
            btnSubmitReset.classList.add('opacity-50', 'cursor-not-allowed');
        }

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('resetPass').value;

            try {
                btnSubmitReset.disabled = true;
                btnSubmitReset.textContent = "Procesando...";

                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, new_password: newPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    resetMessage.textContent = "¡Contraseña actualizada! Redirigiendo al login...";
                    resetMessage.className = "text-accent text-xs text-center  block";
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    resetMessage.textContent = data.detail || "Error al actualizar la contraseña.";
                    resetMessage.className = "text-error text-xs text-center  block";
                    btnSubmitReset.disabled = false;
                    btnSubmitReset.textContent = "Guardar Contraseña";
                }
            } catch (error) {
                resetMessage.textContent = "Error de conexión con el servidor.";
                resetMessage.className = "text-error text-xs text-center  block";
                btnSubmitReset.disabled = false;
                btnSubmitReset.textContent = "Guardar Contraseña";
            }
        });
    </script>



<script>
    let mouse = { x: -1000, y: -1000 };
    document.addEventListener('mousemove', (e) => {
        document.documentElement.style.setProperty('--mouse-x', e.clientX + 'px');
        document.documentElement.style.setProperty('--mouse-y', e.clientY + 'px');
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });
    document.addEventListener('mouseout', () => {
        mouse.x = -1000;
        mouse.y = -1000;
    });

    const canvas = document.createElement('canvas');
    canvas.style.position = 'fixed';
    canvas.style.top = '0';
    canvas.style.left = '0';
    canvas.style.width = '100vw';
    canvas.style.height = '100vh';
    canvas.style.zIndex = '0';
    canvas.style.pointerEvents = 'none';
    document.body.prepend(canvas);
    
    const ctx = canvas.getContext('2d');
    let particlesArray = [];

    function initParticles() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        particlesArray = [];
        let numParticles = Math.floor((window.innerWidth * window.innerHeight) / 10000);
        for (let i = 0; i < numParticles; i++) {
            let size = Math.random() * 2 + 0.5;
            let x = Math.random() * innerWidth;
            let y = Math.random() * innerHeight;
            let speedX = (Math.random() - 0.5) * 0.5;
            let speedY = (Math.random() - 0.5) * 0.5;
            particlesArray.push({ x, y, speedX, speedY, size });
        }
    }

    function animateParticles() {
        requestAnimationFrame(animateParticles);
        ctx.clearRect(0, 0, innerWidth, innerHeight);
        for (let i = 0; i < particlesArray.length; i++) {
            let p = particlesArray[i];
            p.x += p.speedX;
            p.y += p.speedY;
            if (p.x < 0 || p.x > innerWidth) p.speedX *= -1;
            if (p.y < 0 || p.y > innerHeight) p.speedY *= -1;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(245, 245, 220, 0.3)';
            ctx.fill();
            let dxMouse = mouse.x - p.x;
            let dyMouse = mouse.y - p.y;
            let distMouse = Math.sqrt(dxMouse*dxMouse + dyMouse*dyMouse);
            if (distMouse < 150) {
                ctx.beginPath();
                ctx.strokeStyle = `rgba(57, 138, 72, ${0.3 - distMouse/500})`;
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(mouse.x, mouse.y);
                ctx.stroke();
            }
            
            for (let j = i; j < particlesArray.length; j++) {
                let p2 = particlesArray[j];
                let dx = p.x - p2.x;
                let dy = p.y - p2.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < 100) {
                    ctx.beginPath();
                    ctx.strokeStyle = `rgba(57, 138, 72, ${0.15 - distance/1000})`;
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.stroke();
                }
            }
        }
    }

    window.addEventListener('resize', initParticles);
    initParticles();
    animateParticles();
</script>
</body>
</html>
